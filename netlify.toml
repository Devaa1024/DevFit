[build]
  command = "node _build.js"
  publish = "."

# DevFit has moved to Vercel (devfitportal.vercel.app). Any client still hitting
# the old Netlify URL is bounced to the live site so nobody gets stranded.
# NOTE: only works while this repo is still connected to the Netlify site. If the
# Netlify site was disconnected/deleted, unpublish it in the Netlify dashboard and
# re-send the vercel.app link instead.
[[redirects]]
  from = "/*"
  to = "https://devfitportal.vercel.app/:splat"
  status = 301
  force = true

# sw.js must never be cached — browser must always fetch fresh copy to detect updates
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
